name: GGCReader
options:
  bundleIdPrefix: com.jason
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - zh-Hans
    - ja
    - Base

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: true
    GENERATE_INFOPLIST_FILE: true
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: KHMK6Q3L3K

targets:
  GGCReader:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: GGCReader
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jason.ggcreader
        PRODUCT_NAME: "æstel"
        INFOPLIST_KEY_CFBundleDisplayName: "æstel"
        MARKETING_VERSION: "1.4.0"
        CURRENT_PROJECT_VERSION: "10"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Camera access is needed to scan book covers and recognize text."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "æstel uses your calendar to sync reading tasks and record goal completion."
        "CODE_SIGN_ENTITLEMENTS[sdk=iphoneos*]": GGCReader/GGCReader.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=iphonesimulator*]": GGCReader/GGCReader.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": GGCReader/GGCReaderMac.entitlements
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: true
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    entitlements:
      path: GGCReader/GGCReader.entitlements
      properties:
        com.apple.security.personal-information.calendars: true
        com.apple.developer.aps-environment: production

  GGCReaderWatch Watch App:
    type: application
    platform: watchOS
    sources:
      - path: GGCReaderWatch
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jason.ggcreader.watchkitapp
        PRODUCT_NAME: "æstel"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.jason.ggcreader
        CODE_SIGN_ENTITLEMENTS: GGCReaderWatch/GGCReaderWatch.entitlements
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    entitlements:
      path: GGCReaderWatch/GGCReaderWatch.entitlements
