name: GGCReader
options:
  bundleIdPrefix: com.jason
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - zh-Hans
    - ja
    - Base

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: true
    GENERATE_INFOPLIST_FILE: true
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: KHMK6Q3L3K

targets:
  GGCReader:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: GGCReader
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jason.ggcreader
        PRODUCT_NAME: "æstel"
        PRODUCT_MODULE_NAME: GGCReader
        INFOPLIST_KEY_CFBundleDisplayName: "æstel"
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "13"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Camera access is needed to scan book covers and recognize text."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "æstel uses your calendar to sync reading tasks and record goal completion."
        NSSupportsLiveActivities: true
        "CODE_SIGN_ENTITLEMENTS[sdk=iphoneos*]": GGCReader/GGCReader.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=iphonesimulator*]": GGCReader/GGCReader.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": GGCReader/GGCReaderMac.entitlements
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: true
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.books"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    dependencies:
      - target: GGCReaderWidget
        embed: true
        platforms: [iOS]
    entitlements:
      path: GGCReader/GGCReader.entitlements
      properties:
        com.apple.security.personal-information.calendars: true
        com.apple.developer.aps-environment: production
        com.apple.security.application-groups:
          - group.com.jason.ggcreader

  GGCReaderWidget:
    type: app-extension
    platform: iOS
    info:
      path: GGCReaderWidget/Info.plist
      properties:
        CFBundleDisplayName: "æstel Widget"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    sources:
      - path: GGCReaderWidget
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jason.ggcreader.widget
        PRODUCT_NAME: "GGCReaderWidget"
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "13"
        CODE_SIGN_ENTITLEMENTS: GGCReaderWidget/GGCReaderWidget.entitlements
        SWIFT_EMIT_LOC_STRINGS: true
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    entitlements:
      path: GGCReaderWidget/GGCReaderWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jason.ggcreader

  GGCReaderWatch Watch App:
    type: application
    platform: watchOS
    sources:
      - path: GGCReaderWatch
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jason.ggcreader.watchkitapp
        PRODUCT_NAME: "æstel"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.jason.ggcreader
        CODE_SIGN_ENTITLEMENTS: GGCReaderWatch/GGCReaderWatch.entitlements
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    entitlements:
      path: GGCReaderWatch/GGCReaderWatch.entitlements

  GGCReaderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GGCReaderTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jason.ggcreader.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/æstel.app/æstel
    dependencies:
      - target: GGCReader_iOS

schemes:
  GGCReader_iOS:
    build:
      targets:
        GGCReader_iOS: all
        GGCReaderTests: [test]
    test:
      targets:
        - GGCReaderTests
    run:
      targets:
        - GGCReader_iOS
